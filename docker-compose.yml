version: "3.9"

services:
  ollama:
    image: ollama/ollama
    container_name: codescope-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull model on first start (2GB, one time only)
    entrypoint: >
      sh -c "ollama serve &
             sleep 8 &&
             ollama pull llama3.2:3b &&
             wait"

  backend:
    build: ./backend
    container_name: codescope-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: codescope-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
